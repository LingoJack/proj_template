server:
  host: "0.0.0.0"
  port: 8080
  read_timeout_seconds: 30
  write_timeout_seconds: 30
  graceful_shutdown_timeout_seconds: 10

database:
  driver: "mysql"
  dsn: "user:pass@tcp(localhost:3306)/appdb?charset=utf8mb4&parseTime=True&loc=Local"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime_minutes: 30
  log_mode: "info" # silent | error | warn | info

log:
  level: "info" # debug | info | warn | error
  format: "json" # json | text
  output: "stdout" # stdout | file
  file_path: ""

middleware:
  cors:
    enabled: true
    allowed_origins:
      - "http://localhost:5173"
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allow_credentials: true
  rate_limit:
    enabled: false
    requests_per_second: 100
    burst: 20
  auth:
    enabled: false
    jwt_secret: "change-me-in-production"
    jwt_expiry_hours: 24
  request_id:
    enabled: true
  recover:
    enabled: true

api:
  prefix: "/api/v1"
  version: "1.0.0"
